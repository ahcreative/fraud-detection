global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alertmanager@fraud-detection.local'

route:
  group_by: ['alertname', 'component']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      repeat_interval: 1h
    - match:
        component: data_drift
      receiver: 'drift-alerts'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://fraud-api:8000/alerts/webhook'
        send_resolved: true

  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://fraud-api:8000/alerts/webhook'
        send_resolved: true
    # Uncomment and configure email for real alerts:
    # email_configs:
    #   - to: 'team@company.com'
    #     subject: '[CRITICAL] {{ .GroupLabels.alertname }}'

  - name: 'drift-alerts'
    webhook_configs:
      - url: 'http://fraud-api:8000/alerts/drift'
        send_resolved: true
